<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:#ffffff;
    font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;
  }
  #wrap{ display:inline-block; padding:44px 48px; background:#fbfcfe; }
  svg{ display:block; }
  .goal{
    margin:26px 10px 4px;
    padding:22px 34px;
    background:linear-gradient(135deg,#2b2f3a,#3d4457);
    color:#fff; border-radius:18px; text-align:center;
    box-shadow:0 10px 26px rgba(45,52,74,.20);
  }
  .goal .l{ font-size:17px; letter-spacing:5px; color:#c9d2e4; margin-bottom:8px; }
  .goal .t{ font-size:25px; font-weight:800; }
</style>
</head>
<body>
<div id="wrap"><svg id="svg"></svg>
  <div class="goal"><div class="l">核 心 目 标</div>
    <div class="t">持续提升海外品牌影响力、渠道经营能力及业务增长</div></div>
</div>
<script>
const DATA = {
  name:"海外整合营销中台", type:"root",
  children:[
    { name:"Build · 体系建设", tag:"BUILD", color:"#2f80ed", children:[
      { name:"全球营销体系建设", children:[
        {name:"营销体系标准化"},
        {name:"工具包与方法论"},
        {name:"项目管理机制"},
        {name:"跨部门协同"},
      ]},
    ]},
    { name:"Growth · 业务增长", tag:"GROWTH", color:"#eb5757", children:[
      { name:"IMC 整合营销与资源管理", children:[
        {name:"新品上市策略"},
        {name:"品牌 Campaign"},
        {name:"新店开业营销"},
        {name:"营销预算管理"},
        {name:"营销资源整合"},
      ]},
      { name:"渠道增长与经营管理", children:[
        {name:"渠道体系搭建"},
        {name:"增长策略制定"},
        {name:"数据分析 & ROI 优化"},
        {name:"运营方法论沉淀"},
      ]},
    ]},
    { name:"Enable · 能力赋能", tag:"ENABLE", color:"#27ae60", children:[
      { name:"会员体系建设", children:[
        {name:"APP 会员体系"},
        {name:"数字化能力"},
        {name:"会员机制规划"},
      ]},
      { name:"营销能力建设", children:[
        {name:"海外业务支持"},
        {name:"营销资源建设"},
        {name:"跨部门协同赋能"},
      ]},
    ]},
  ]
};

const COLS = [60, 430, 830, 1230];
const ROW  = 64, TOPM = 24;
const H  = {0:76, 1:58, 2:52, 3:46};
const FS = {0:30, 1:24, 2:21, 3:18};
const PADX = {0:34, 1:26, 2:22, 3:20};

const mc = document.createElement("canvas").getContext("2d");
function measure(t, fs, bold){
  mc.font = (bold?"700 ":"600 ")+fs+'px "Microsoft YaHei","PingFang SC",sans-serif';
  return mc.measureText(t).width;
}
function prep(n, depth, color){
  n.depth = depth;
  n.color = n.color || color || "#3d4457";
  n.w = measure(n.name, FS[depth], depth<=1) + PADX[depth]*2;
  n.h = H[depth];
  (n.children||[]).forEach(c=>prep(c, depth+1, n.color));
}
prep(DATA,0,null);

let leaf=0;
function layout(n){
  n.x = COLS[n.depth];
  if(n.children && n.children.length){
    n.children.forEach(layout);
    n.y = (n.children[0].y + n.children[n.children.length-1].y)/2;
  } else { n.y = TOPM + leaf*ROW + ROW/2; leaf++; }
}
layout(DATA);

const nodes=[], links=[];
(function walk(n){ nodes.push(n); (n.children||[]).forEach(c=>{links.push([n,c]);walk(c);}); })(DATA);
let maxX=0,maxY=0;
nodes.forEach(n=>{ maxX=Math.max(maxX,n.x+n.w); maxY=Math.max(maxY,n.y+n.h/2); });
const W=maxX+50, HH=maxY+24;

function branch(p,c){
  const x0=p.x+p.w, y0=p.y, x1=c.x, y1=c.y;
  const b0=Math.max(7, p.depth===0?11:9), b1=2.4, mx=(x0+x1)/2;
  return `M ${x0} ${y0-b0/2} C ${mx} ${y0-b0/2} ${mx} ${y1-b1/2} ${x1} ${y1-b1/2}
          L ${x1} ${y1+b1/2} C ${mx} ${y1+b1/2} ${mx} ${y0+b0/2} ${x0} ${y0+b0/2} Z`;
}

let s=`<svg width="${W}" height="${HH}" viewBox="0 0 ${W} ${HH}" xmlns="http://www.w3.org/2000/svg">`;
s+=`<defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1f2a44" flood-opacity="0.14"/></filter>
    <linearGradient id="g0" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#2b2f3a"/><stop offset="1" stop-color="#3d4457"/></linearGradient></defs>`;
links.forEach(([p,c])=>{ s+=`<path d="${branch(p,c)}" fill="${c.color}" opacity="0.92"/>`; });
nodes.forEach(n=>{
  const x=n.x, y=n.y-n.h/2, r=n.h/2, tx=x+n.w/2;
  let fill,stroke="none",tcol,sw=0,fw=n.depth<=1?"700":"600";
  if(n.depth===0){ fill="url(#g0)"; tcol="#fff"; }
  else if(n.depth===1){ fill=n.color; tcol="#fff"; }
  else if(n.depth===2){ fill="#ffffff"; stroke=n.color; tcol="#1f2430"; sw=2.5; }
  else { fill="#f4f7fc"; tcol="#2a2f3a"; }
  s+=`<g filter="${n.depth<=2?'url(#sh)':''}">
      <rect x="${x}" y="${y}" width="${n.w}" height="${n.h}" rx="${r}" ry="${r}"
            fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
  if(n.depth===3) s+=`<rect x="${x}" y="${y}" width="6" height="${n.h}" rx="3" fill="${n.color}"/>`;
  s+=`<text x="${tx}" y="${n.y}" text-anchor="middle" dominant-baseline="middle"
        font-size="${FS[n.depth]}" font-weight="${fw}" fill="${tcol}"
        font-family='"Microsoft YaHei","PingFang SC",sans-serif'>${n.name}</text></g>`;
});
s+=`</svg>`;
document.getElementById("svg").outerHTML=s;
</script>
</body>
</html>
